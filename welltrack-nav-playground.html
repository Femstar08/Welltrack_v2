<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WellTrack Navigation Playground</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 24px; }

  .header { text-align: center; margin-bottom: 20px; }
  .header h1 { font-size: 22px; color: #fff; margin-bottom: 4px; }
  .header p { font-size: 13px; color: #888; }

  .toggle-bar { display: flex; gap: 0; margin-bottom: 24px; border-radius: 10px; overflow: hidden; border: 1px solid #333; }
  .toggle-btn { padding: 10px 28px; background: #1a1a1a; color: #888; border: none; cursor: pointer; font-size: 14px; font-weight: 600; transition: all 0.2s; }
  .toggle-btn.active { background: #4DA8FF; color: #fff; }

  .phone-frame { width: 375px; height: 780px; background: #0E0E0E; border-radius: 40px; border: 3px solid #333; overflow: hidden; position: relative; box-shadow: 0 20px 60px rgba(0,0,0,0.6); }

  .status-bar { height: 44px; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; font-size: 12px; color: #999; }
  .status-bar .time { font-weight: 600; color: #fff; }

  .screen-content { height: calc(100% - 44px - 64px); overflow-y: auto; padding: 0 0 16px 0; scrollbar-width: none; }
  .screen-content::-webkit-scrollbar { display: none; }

  .bottom-nav { height: 64px; background: rgba(26,25,25,0.95); border-top: 1px solid #2a2a2a; display: flex; align-items: center; justify-content: space-around; position: absolute; bottom: 0; left: 0; right: 0; backdrop-filter: blur(10px); }
  .nav-item { display: flex; flex-direction: column; align-items: center; gap: 2px; cursor: pointer; padding: 6px 16px; border-radius: 12px; transition: all 0.15s; }
  .nav-item:hover { background: rgba(77,168,255,0.08); }
  .nav-item .icon { font-size: 22px; color: #666; transition: color 0.15s; }
  .nav-item .label { font-size: 10px; color: #666; font-weight: 500; transition: color 0.15s; }
  .nav-item.active .icon { color: #4DA8FF; }
  .nav-item.active .label { color: #4DA8FF; font-weight: 700; }

  .fab { position: absolute; bottom: 80px; right: 20px; width: 52px; height: 52px; background: #4DA8FF; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 28px; color: #fff; box-shadow: 0 4px 16px rgba(77,168,255,0.4); cursor: pointer; z-index: 10; }
  .fab:hover { transform: scale(1.05); }

  /* Cards */
  .card { background: #1A1919; border-radius: 16px; padding: 16px; margin: 0 16px 12px; }
  .card-title { font-size: 12px; color: #4DA8FF; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .card-value { font-size: 28px; font-weight: 700; color: #fff; }
  .card-sub { font-size: 12px; color: #888; margin-top: 2px; }

  .section-title { font-size: 14px; font-weight: 600; color: #fff; padding: 12px 16px 8px; }

  /* Module grid */
  .module-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 0 16px; margin-bottom: 12px; }
  .module-tile { background: #1A1919; border-radius: 12px; padding: 12px 8px; text-align: center; cursor: pointer; transition: background 0.15s; }
  .module-tile:hover { background: #252525; }
  .module-tile .tile-icon { font-size: 20px; margin-bottom: 4px; }
  .module-tile .tile-label { font-size: 10px; color: #ccc; font-weight: 500; }

  /* Macro bars */
  .macro-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; }
  .macro-label { font-size: 12px; color: #ccc; width: 60px; }
  .macro-bar-bg { flex: 1; height: 6px; background: #2a2a2a; border-radius: 3px; margin: 0 8px; }
  .macro-bar-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
  .macro-val { font-size: 11px; color: #888; width: 50px; text-align: right; }

  /* Sparkline */
  .sparkline { display: flex; align-items: flex-end; gap: 3px; height: 40px; }
  .spark-bar { width: 100%; border-radius: 2px; transition: height 0.3s; }

  /* Quick actions */
  .quick-actions { display: flex; gap: 8px; padding: 0 16px; margin-bottom: 12px; }
  .quick-action { flex: 1; background: #1A1919; border-radius: 12px; padding: 14px 8px; text-align: center; cursor: pointer; }
  .quick-action:hover { background: #252525; }
  .quick-action .qa-icon { font-size: 20px; margin-bottom: 4px; }
  .quick-action .qa-label { font-size: 10px; color: #ccc; }

  /* Meal slots */
  .meal-slot { display: flex; align-items: center; padding: 10px 0; border-bottom: 1px solid #222; }
  .meal-slot:last-child { border-bottom: none; }
  .meal-time { font-size: 11px; color: #4DA8FF; width: 70px; font-weight: 600; }
  .meal-name { font-size: 13px; color: #fff; flex: 1; }
  .meal-cals { font-size: 11px; color: #888; }

  /* Settings list */
  .settings-item { display: flex; align-items: center; padding: 14px 16px; border-bottom: 1px solid #1a1a1a; cursor: pointer; }
  .settings-item:hover { background: #1a1919; }
  .settings-item .si-icon { font-size: 18px; color: #4DA8FF; margin-right: 12px; }
  .settings-item .si-label { font-size: 14px; color: #fff; flex: 1; }
  .settings-item .si-arrow { color: #555; }

  /* Habit row */
  .habit-row { display: flex; align-items: center; padding: 8px 0; gap: 10px; }
  .habit-check { width: 20px; height: 20px; border-radius: 50%; border: 2px solid #4DA8FF; display: flex; align-items: center; justify-content: center; font-size: 12px; cursor: pointer; }
  .habit-check.done { background: #4DA8FF; }
  .habit-label { font-size: 13px; color: #ccc; }
  .habit-streak { font-size: 11px; color: #FF9800; margin-left: auto; }

  /* Chart placeholder */
  .chart-area { height: 100px; background: linear-gradient(135deg, rgba(77,168,255,0.08), rgba(77,168,255,0.02)); border-radius: 12px; display: flex; align-items: flex-end; padding: 8px; gap: 2px; margin-top: 8px; }
  .chart-bar { flex: 1; background: #4DA8FF; border-radius: 2px 2px 0 0; opacity: 0.7; }

  /* Prompt area */
  .prompt-area { margin-top: 24px; width: 375px; background: #1a1a1a; border-radius: 12px; padding: 16px; border: 1px solid #333; }
  .prompt-label { font-size: 11px; color: #4DA8FF; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .prompt-text { font-size: 13px; color: #ccc; line-height: 1.6; font-family: 'SF Mono', 'Fira Code', monospace; }
  .copy-btn { margin-top: 12px; background: #4DA8FF; color: #fff; border: none; padding: 8px 20px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; }
  .copy-btn:hover { background: #3a95e8; }

  /* Diff badge */
  .diff-badge { display: inline-block; background: rgba(77,168,255,0.15); color: #4DA8FF; font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 600; margin-left: 6px; }
  .diff-badge.removed { background: rgba(239,83,80,0.15); color: #EF5350; }
  .diff-badge.new { background: rgba(76,175,80,0.15); color: #4CAF50; }

  /* Workout tabs */
  .tab-bar { display: flex; padding: 0 16px; gap: 0; margin-bottom: 12px; }
  .tab-item { flex: 1; text-align: center; padding: 10px; font-size: 13px; color: #666; border-bottom: 2px solid transparent; cursor: pointer; font-weight: 500; }
  .tab-item.active { color: #4DA8FF; border-bottom-color: #4DA8FF; }

  /* AI card */
  .ai-card { background: linear-gradient(135deg, rgba(77,168,255,0.1), rgba(77,168,255,0.03)); border: 1px solid rgba(77,168,255,0.2); border-radius: 16px; padding: 16px; margin: 0 16px 12px; }
  .ai-card .ai-icon { font-size: 16px; color: #4DA8FF; margin-bottom: 6px; }
  .ai-card .ai-text { font-size: 12px; color: #bbb; line-height: 1.5; font-style: italic; }

  /* Steps row */
  .steps-row { display: flex; gap: 8px; padding: 0 16px; margin-bottom: 12px; }
  .step-tile { flex: 1; background: #1A1919; border-radius: 16px; padding: 16px; }
  .step-tile .st-icon { font-size: 18px; margin-bottom: 6px; }
  .step-tile .st-value { font-size: 22px; font-weight: 700; color: #fff; }
  .step-tile .st-label { font-size: 11px; color: #888; }
</style>
</head>
<body>

<div class="header">
  <h1>WellTrack Navigation Playground</h1>
  <p>Compare current vs proposed bottom navigation layout</p>
</div>

<div class="toggle-bar">
  <button class="toggle-btn active" onclick="setLayout('current')">Current</button>
  <button class="toggle-btn" onclick="setLayout('proposed')">Proposed</button>
</div>

<div class="phone-frame">
  <div class="status-bar">
    <span class="time">14:16</span>
    <span>⚡ 71%</span>
  </div>

  <div class="screen-content" id="screenContent"></div>

  <div class="fab" onclick="alert('Opens Enhanced Log Sheet:\n• Log Food\n• Barcode Scan\n• Voice Log (PRO)\n• Meal Scan (PRO)\n• Water\n• Weight\n• Exercise')">+</div>

  <div class="bottom-nav" id="bottomNav"></div>
</div>

<div class="prompt-area">
  <div class="prompt-label">Implementation Prompt</div>
  <div class="prompt-text" id="promptText"></div>
  <button class="copy-btn" onclick="copyPrompt()">Copy Prompt</button>
</div>

<script>
const state = {
  layout: 'current',
  activeTab: 0,
};

const layouts = {
  current: {
    tabs: [
      { icon: '🏠', iconOutline: '🏠', label: 'Home' },
      { icon: '📝', iconOutline: '📝', label: 'Log' },
      { icon: '💪', iconOutline: '💪', label: 'Workouts' },
      { icon: '👤', iconOutline: '👤', label: 'Profile' },
    ],
  },
  proposed: {
    tabs: [
      { icon: '🏠', iconOutline: '🏠', label: 'Home' },
      { icon: '📅', iconOutline: '📅', label: 'Plan' },
      { icon: '📈', iconOutline: '📈', label: 'Progress' },
      { icon: '👤', iconOutline: '👤', label: 'Profile' },
    ],
  },
};

function setLayout(layout) {
  state.layout = layout;
  state.activeTab = 0;
  document.querySelectorAll('.toggle-btn').forEach((btn, i) => {
    btn.classList.toggle('active', (i === 0 && layout === 'current') || (i === 1 && layout === 'proposed'));
  });
  render();
}

function setTab(index) {
  state.activeTab = index;
  render();
}

function renderNav() {
  const nav = document.getElementById('bottomNav');
  const tabs = layouts[state.layout].tabs;
  nav.innerHTML = tabs.map((t, i) => `
    <div class="nav-item ${i === state.activeTab ? 'active' : ''}" onclick="setTab(${i})">
      <span class="icon">${t.icon}</span>
      <span class="label">${t.label}</span>
    </div>
  `).join('');
}

function renderScreen() {
  const el = document.getElementById('screenContent');
  if (state.layout === 'current') {
    el.innerHTML = [renderCurrentHome, renderCurrentLog, renderCurrentWorkouts, renderCurrentProfile][state.activeTab]();
  } else {
    el.innerHTML = [renderProposedHome, renderProposedPlan, renderProposedProgress, renderProposedProfile][state.activeTab]();
  }
}

  if (state.layout === 'current') {

  } else {

function copyPrompt() {
  const text = document.getElementById('promptText').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy Prompt', 1500);
  });
}
