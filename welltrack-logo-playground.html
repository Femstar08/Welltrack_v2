<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WellTrack Logo Designer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;color:#e0e0e0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;display:flex;min-height:100vh}
.sidebar{width:320px;background:#1a1a1a;padding:20px;overflow-y:auto;border-right:1px solid #333;flex-shrink:0}
.main{flex:1;padding:32px;overflow-y:auto}
h1{font-size:20px;color:#fff;margin-bottom:4px}
.sub{font-size:12px;color:#888;margin-bottom:20px}
h3{font-size:12px;color:#4DA8FF;text-transform:uppercase;letter-spacing:1px;margin:20px 0 10px}
.icon-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.icon-opt{background:#222;border:2px solid transparent;border-radius:12px;padding:12px 8px;text-align:center;cursor:pointer;transition:all .15s}
.icon-opt:hover{background:#2a2a2a}
.icon-opt.active{border-color:#4DA8FF;background:rgba(77,168,255,.1)}
.icon-opt svg{width:36px;height:36px;display:block;margin:0 auto 6px}
.icon-opt .lbl{font-size:9px;color:#999;line-height:1.2}
.control{margin-bottom:14px}
.control label{display:block;font-size:12px;color:#bbb;margin-bottom:4px}
.control input[type=color]{width:100%;height:36px;border:1px solid #333;border-radius:8px;background:#222;cursor:pointer;padding:2px}
.control input[type=range]{width:100%;accent-color:#4DA8FF}
.control select{width:100%;padding:8px;background:#222;color:#e0e0e0;border:1px solid #333;border-radius:8px;font-size:13px}
.control .val{font-size:11px;color:#666;text-align:right}
.toggle{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;color:#ccc}
.toggle input{accent-color:#4DA8FF;width:16px;height:16px}
.presets{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.preset{padding:6px 12px;background:#222;border:1px solid #333;border-radius:8px;font-size:11px;color:#bbb;cursor:pointer;transition:all .15s}
.preset:hover{background:#333;color:#fff}
.preset.active{border-color:#4DA8FF;color:#4DA8FF}
.preview-row{display:flex;gap:24px;flex-wrap:wrap;margin-bottom:32px;justify-content:center}
.preview-card{text-align:center}
.preview-card .title{font-size:11px;color:#888;margin-bottom:8px}
.preview-container{display:inline-flex;align-items:center;justify-content:center;position:relative}
.bg-checker{background:repeating-conic-gradient(#333 0% 25%,#222 0% 50%) 50%/16px 16px}
.store-mock{background:#1a1a1a;border-radius:16px;padding:16px 20px;display:flex;align-items:center;gap:16px;min-width:300px}
.store-mock .app-name{font-size:16px;font-weight:600;color:#fff}
.store-mock .app-dev{font-size:12px;color:#888}
.store-mock .install{background:#4DA8FF;color:#fff;padding:6px 20px;border-radius:20px;font-size:13px;font-weight:600;margin-left:auto}
.dual-bg{display:flex;gap:2px;border-radius:16px;overflow:hidden}
.dual-bg .dark-side,.dual-bg .light-side{padding:24px;display:flex;align-items:center;justify-content:center}
.dual-bg .dark-side{background:#0E0E0E}
.dual-bg .light-side{background:#f5f5f5}
.prompt-area{background:#1a1a1a;border-radius:12px;padding:16px;border:1px solid #333;margin-top:24px}
.prompt-label{font-size:11px;color:#4DA8FF;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.prompt-text{font-size:12px;color:#ccc;line-height:1.6;font-family:'SF Mono','Fira Code',monospace;white-space:pre-wrap}
.copy-btn{margin-top:12px;background:#4DA8FF;color:#fff;border:none;padding:8px 20px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600}
.copy-btn:hover{background:#3a95e8}
</style>
</head>
<body>

<div class="sidebar">
  <h1>WellTrack Logo</h1>
  <div class="sub">Design your app icon and logo</div>

  <h3>Presets</h3>
  <div class="presets" id="presets"></div>

  <h3>Icon Style</h3>
  <div class="icon-grid" id="iconGrid"></div>

  <h3>Colors</h3>
  <div class="control">
    <label>Primary Color</label>
    <input type="color" id="primaryColor" value="#4DA8FF" oninput="state.primary=this.value;updateAll()">
  </div>
  <div class="control">
    <label>Background</label>
    <select id="bgType" onchange="state.bgType=this.value;updateAll()">
      <option value="dark">Dark (#0E0E0E)</option>
      <option value="gradient">Gradient (blue → dark)</option>
      <option value="solid">Solid primary</option>
      <option value="white">White</option>
    </select>
  </div>

  <h3>Style</h3>
  <div class="control">
    <label>Icon Weight</label>
    <select id="weight" onchange="state.weight=this.value;updateAll()">
      <option value="thin">Thin (1.5px)</option>
      <option value="regular" selected>Regular (2.5px)</option>
      <option value="bold">Bold (3.5px)</option>
    </select>
  </div>
  <div class="control">
    <label>Corner Radius: <span class="val" id="radiusVal">22%</span></label>
    <input type="range" min="0" max="50" value="22" id="radius" oninput="state.radius=+this.value;document.getElementById('radiusVal').textContent=this.value+'%';updateAll()">
  </div>

  <h3>Text</h3>
  <label class="toggle">
    <input type="checkbox" id="showText" checked onchange="state.showText=this.checked;updateAll()">
    Show "WellTrack" text
  </label>
  <div class="control" style="margin-top:8px">
    <label>Text Weight</label>
    <select id="textWeight" onchange="state.textWeight=this.value;updateAll()">
      <option value="300">Light</option>
      <option value="400">Regular</option>
      <option value="600" selected>Semi-bold</option>
      <option value="700">Bold</option>
    </select>
  </div>
</div>

<div class="main">
  <div class="preview-row" id="previews"></div>
  <div class="prompt-area">
    <div class="prompt-label">Design Brief for Graphic Designer</div>
    <div class="prompt-text" id="promptText"></div>
    <button class="copy-btn" onclick="copyPrompt()">Copy Brief</button>
  </div>
</div>

<script>
const ICONS = {
  heartPulse: {
    name: 'Heart Pulse',
    desc: 'Heart with ECG line',
    svg: (c,w) => `<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M32 56S8 40 8 24c0-8.8 7.2-16 16-16 4.8 0 9.1 2.1 12 5.5C38.9 10.1 43.2 8 48 8c8.8 0 16 7.2 16 16 0 16-24 32-32 32z" stroke="${c}" stroke-width="${w}" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M12 32h12l4-8 6 16 6-12 4 4h12" stroke="${c}" stroke-width="${w}" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>`
  },
  shieldPulse: {
    name: 'Shield Pulse',
    desc: 'Health protection',
    svg: (c,w) => `<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M32 4L8 16v16c0 14.4 10.4 27.2 24 32 13.6-4.8 24-17.6 24-32V16L32 4z" stroke="${c}" stroke-width="${w}" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M18 34h8l3-6 5 12 5-10 3 4h8" stroke="${c}" stroke-width="${w}" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>`
  },
  arrowCircle: {
    name: 'Progress Arrow',
    desc: 'Upward optimization',
    svg: (c,w) => `<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="32" cy="32" r="26" stroke="${c}" stroke-width="${w}"/>
      <path d="M32 44V22M24 30l8-8 8 8" stroke="${c}" stroke-width="${w}" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M22 44h20" stroke="${c}" stroke-width="${w}" stroke-linecap="round"/>
    </svg>`
  },
  mountainPeak: {
    name: 'Peak Pulse',
    desc: 'Peak performance',
    svg: (c,w) => `<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M4 52L20 20l8 12 12-24 16 44H4z" stroke="${c}" stroke-width="${w}" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M4 38h14l3-5 4 10 4-8 3 3h28" stroke="${c}" stroke-width="${w}" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>`
  },
  hexagonW: {
    name: 'Hex W',
    desc: 'Modern tech',
    svg: (c,w) => `<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M32 4L56 18v28L32 60 8 46V18L32 4z" stroke="${c}" stroke-width="${w}" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M18 24l5 16 9-12 9 12 5-16" stroke="${c}" stroke-width="${w*1.2}" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>`
  },
  progressRing: {
    name: 'Track Ring',
    desc: 'Progress tracking',
    svg: (c,w) => `<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="32" cy="32" r="26" stroke="${c}" stroke-width="${w}" opacity="0.25"/>
      <path d="M32 6a26 26 0 0 1 22.5 39" stroke="${c}" stroke-width="${w}" stroke-linecap="round"/>
      <path d="M24 32l5 5 11-11" stroke="${c}" stroke-width="${w*1.1}" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>`
  }
};

const PRESETS = [
  { name: 'Recovery', icon: 'heartPulse', primary: '#4DA8FF', bgType: 'dark', weight: 'regular', radius: 22, showText: true, textWeight: '600' },
  { name: 'Shield', icon: 'shieldPulse', primary: '#4DA8FF', bgType: 'gradient', weight: 'bold', radius: 22, showText: true, textWeight: '700' },
  { name: 'Minimal', icon: 'progressRing', primary: '#FFFFFF', bgType: 'solid', weight: 'thin', radius: 50, showText: false, textWeight: '300' },
  { name: 'Tech', icon: 'hexagonW', primary: '#4DA8FF', bgType: 'dark', weight: 'bold', radius: 16, showText: true, textWeight: '700' },
  { name: 'Peak', icon: 'mountainPeak', primary: '#4DA8FF', bgType: 'gradient', weight: 'regular', radius: 22, showText: true, textWeight: '600' },
];

const state = { icon: 'heartPulse', primary: '#4DA8FF', bgType: 'dark', weight: 'regular', radius: 22, showText: true, textWeight: '600' };

function getStrokeWidth() { return state.weight === 'thin' ? 1.5 : state.weight === 'bold' ? 3.5 : 2.5; }

function getBgStyle(size) {
  switch(state.bgType) {
    case 'dark': return `background:#0E0E0E`;
    case 'gradient': return `background:linear-gradient(135deg, ${state.primary}22, #0E0E0E)`;
    case 'solid': return `background:${state.primary}`;
    case 'white': return `background:#ffffff`;
  }
}

function getIconColor() {
  return state.bgType === 'solid' ? '#ffffff' : state.bgType === 'white' ? state.primary : state.primary;
}

function renderIcon(size) {
  const iconFn = ICONS[state.icon].svg;
  const sw = getStrokeWidth();
  const color = getIconColor();
  const r = state.radius;
  const textColor = state.bgType === 'solid' ? '#fff' : state.bgType === 'white' ? '#333' : '#fff';

  let html = `<div style="width:${size}px;height:${size + (state.showText ? size*0.2 : 0)}px;${getBgStyle(size)};border-radius:${r}%;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden">`;
  html += `<div style="width:${size*0.55}px;height:${size*0.55}px">${iconFn(color, sw)}</div>`;
  if (state.showText && size >= 64) {
    const fs = Math.max(8, size * 0.1);
    html += `<div style="color:${textColor};font-size:${fs}px;font-weight:${state.textWeight};margin-top:${size*0.03}px;letter-spacing:${fs*0.05}px">WellTrack</div>`;
  }
  html += `</div>`;
  return html;
}

function updateAll() {
  // Icon grid
  const grid = document.getElementById('iconGrid');
  grid.innerHTML = Object.entries(ICONS).map(([key, val]) =>
    `<div class="icon-opt ${state.icon===key?'active':''}" onclick="state.icon='${key}';updateAll()">
      <div style="width:36px;height:36px;margin:0 auto">${val.svg(state.icon===key?'#4DA8FF':'#888', 2)}</div>
      <div class="lbl">${val.name}</div>
    </div>`
  ).join('');

  // Presets
  document.getElementById('presets').innerHTML = PRESETS.map((p,i) =>
    `<div class="preset ${JSON.stringify(p)===JSON.stringify({name:p.name,...state})?'active':''}" onclick="applyPreset(${i})">${p.name}</div>`
  ).join('');

  // Previews
  const el = document.getElementById('previews');
  el.innerHTML = `
    <div class="preview-card">
      <div class="title">Large (256px)</div>
      ${renderIcon(256)}
    </div>
    <div class="preview-card">
      <div class="title">App Icon (96px)</div>
      ${renderIcon(96)}
    </div>
    <div class="preview-card">
      <div class="title">Favicon (32px)</div>
      ${renderIcon(32)}
    </div>
    <div class="preview-card">
      <div class="title">Dark vs Light</div>
      <div class="dual-bg">
        <div class="dark-side" style="width:120px;height:120px">${renderIcon(80)}</div>
        <div class="light-side" style="width:120px;height:120px">
          <div style="width:80px;height:${80 + (state.showText ? 16 : 0)}px;background:${state.bgType==='white'?'#fff':'#0E0E0E'};border-radius:${state.radius}%;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden">
            <div style="width:44px;height:44px">${ICONS[state.icon].svg(state.bgType==='white'?state.primary:state.primary, getStrokeWidth())}</div>
            ${state.showText ? `<div style="color:${state.bgType==='white'?'#333':'#fff'};font-size:8px;font-weight:${state.textWeight};margin-top:2px">WellTrack</div>` : ''}
          </div>
        </div>
      </div>
    </div>
    <div class="preview-card" style="width:100%">
      <div class="title">Play Store Listing</div>
      <div class="store-mock">
        <div style="width:64px;height:64px;flex-shrink:0">${renderIcon(64)}</div>
        <div>
          <div class="app-name">WellTrack</div>
          <div class="app-dev">WellTrack Ltd · Health & Fitness</div>
          <div style="font-size:11px;color:#4DA8FF;margin-top:2px">★★★★★ 4.8</div>
        </div>
        <div class="install">Install</div>
      </div>
    </div>
  `;

  updatePrompt();
}

function applyPreset(i) {
  const p = PRESETS[i];
  state.icon = p.icon;
  state.primary = p.primary;
  state.bgType = p.bgType;
  state.weight = p.weight;
  state.radius = p.radius;
  state.showText = p.showText;
  state.textWeight = p.textWeight;
  document.getElementById('primaryColor').value = p.primary;
  document.getElementById('bgType').value = p.bgType;
  document.getElementById('weight').value = p.weight;
  document.getElementById('radius').value = p.radius;
  document.getElementById('radiusVal').textContent = p.radius + '%';
  document.getElementById('showText').checked = p.showText;
  document.getElementById('textWeight').value = p.textWeight;
  updateAll();
}

function updatePrompt() {
  const icon = ICONS[state.icon];
  const bgDesc = {dark:'near-black (#0E0E0E)',gradient:'gradient from blue to dark',solid:`solid ${state.primary}`,white:'white'}[state.bgType];
  const weightDesc = {thin:'thin/light',regular:'medium',bold:'bold/heavy'}[state.weight];
  const textDesc = state.showText ? ` with "WellTrack" wordmark below in ${state.textWeight >= 600 ? 'semi-bold to bold' : state.textWeight >= 400 ? 'regular' : 'light'} weight` : ' (icon only, no text)';
  const radiusDesc = state.radius >= 45 ? 'circular' : state.radius >= 20 ? 'rounded square (iOS-style)' : state.radius > 0 ? 'slightly rounded square' : 'sharp square';

  document.getElementById('promptText').textContent =
`WellTrack App Icon Design Brief

Icon: ${icon.name} — ${icon.desc}
Style: ${weightDesc} stroke weight, clean line art
Primary Color: ${state.primary}
Background: ${bgDesc}
Shape: ${radiusDesc} (${state.radius}% corner radius)
Logo Treatment: ${state.showText ? 'Icon + "WellTrack" wordmark' : 'Icon only'}${textDesc}

Deliverables needed:
• 1024x1024 PNG (Play Store upload)
• 512x512 PNG (adaptive icon foreground)
• 192x192 PNG (web manifest)
• SVG source file
• Adaptive icon: foreground layer (icon only, centered in safe zone) + background layer (solid or gradient)

Brand context: WellTrack is a performance and recovery optimization app for health-conscious professionals. The icon should convey data-driven wellness, not medical/clinical. Modern, premium, tech-forward aesthetic. Blue primary palette on dark backgrounds.`;
}

function copyPrompt() {
  navigator.clipboard.writeText(document.getElementById('promptText').textContent).then(() => {
    const btn = document.querySelector('.copy-btn');
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy Brief', 1500);
  });
}

updateAll();
</script>
</body>
</html>
